name: Deploy to Tencent COS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VERCEL: 'true'

      - name: Deploy to Tencent COS
        run: |
          pip install coscmd --quiet

          coscmd config \
            -a "${{ secrets.COS_SECRET_ID }}" \
            -s "${{ secrets.COS_SECRET_KEY }}" \
            -b "${{ secrets.COS_BUCKET }}" \
            -r ap-guangzhou

          # Delete old files
          coscmd delete -r -f / 2>/dev/null || true

          # Upload all files
          coscmd upload -r dist/ /

          echo "Deployed to COS: ${{ secrets.COS_BUCKET }}"
