name: Sync to Gitee & Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Gitee
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add gitee "https://ye-lei-boli077:${{ secrets.GITEE_TOKEN }}@gitee.com/ye-lei-boli077/xunjian-zhuanxiang.git"
          git push gitee main --force

  deploy-pages:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gitee Pages deploy
        run: |
          sleep 10
          curl -X POST \
            "https://gitee.com/api/v5/repos/ye-lei-boli077/xunjian-zhuanxiang/pages/builds" \
            -H "Content-Type: application/json" \
            -d "{\"access_token\": \"${{ secrets.GITEE_TOKEN }}\"}"
