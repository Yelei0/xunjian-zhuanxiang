name: Sync to Gitee & Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror GitHub to Gitee
        uses: Yikun/hub-mirror-action@master
        with:
          src: github/Yelei0/xunjian-zhuanxiang
          dst: gitee/ye-lei-boli077/xunjian-zhuanxiang
          dst_key: ""
          dst_token: ${{ secrets.GITEE_TOKEN }}
          force_update: true

  deploy-pages:
    needs: sync
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Gitee Pages deploy
        run: |
          curl -X POST \
            "https://gitee.com/api/v5/repos/ye-lei-boli077/xunjian-zhuanxiang/pages/builds" \
            -H "Content-Type: application/json" \
            -d '{"access_token": "${{ secrets.GITEE_TOKEN }}"}'
